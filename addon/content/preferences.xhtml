<linkset>
  <html:link rel="localization" href="__addonRef__-preferences.ftl" />
</linkset>
<groupbox
  onload="Zotero.__addonInstance__.hooks.onPrefsEvent('load', { window })"
>
  <label><html:h2 data-l10n-id="pref-title"></html:h2></label>
  <html:p data-l10n-id="pref-intro"></html:p>
  <checkbox
    id="zotero-prefpane-__addonRef__-enable"
    preference="enable"
    data-l10n-id="pref-enable"
  />
  <hbox>
    <html:label
      for="zotero-prefpane-__addonRef__-port"
      data-l10n-id="pref-port"
    ></html:label>
    <html:input
      type="number"
      min="1"
      max="65535"
      id="zotero-prefpane-__addonRef__-port"
      preference="port"
    ></html:input>
  </hbox>
  <checkbox
    id="zotero-prefpane-__addonRef__-allow-remote"
    preference="allowRemote"
    data-l10n-id="pref-allow-remote"
  />
  <separator class="thin" />
  <html:h3 data-l10n-id="pref-status-heading"></html:h3>
  <html:p id="__addonRef__-server-status"></html:p>
  <html:label data-l10n-id="pref-endpoint-label"></html:label>
  <html:pre id="__addonRef__-endpoint"></html:pre>
  <html:label data-l10n-id="pref-config-label"></html:label>
  <html:pre id="__addonRef__-config"></html:pre>
  <vbox>
    <html:p data-l10n-id="pref-help"></html:p>
    <html:p
      data-l10n-id="pref-build"
      data-l10n-args='{"time": "__buildTime__", "name": "__addonName__", "version": "__buildVersion__"}'
    ></html:p>
  </vbox>
</groupbox>
